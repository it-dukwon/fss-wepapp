<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>종합 대시보드</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    #dashboard-container {
      width: 100%;
      flex: 1;
      min-height: 0;
      border: none;
    }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .page-header {
      flex-shrink: 0;
    }
    #dashboard-status {
      padding: 24px;
      font-size: 0.95rem;
      color: #555;
    }
  </style>
</head>
<body>
  <header class="page-header" id="page-header">
    <a href="../index.html" class="logo-link" title="메인으로">
      <img src="../images/logo_text.png" alt="덕원농장 위탁장 관리" class="page-logo" />
    </a>
    <h2 class="detail-title">종합 대시보드</h2>
  </header>

  <div id="dashboard-status">대시보드 로딩 중...</div>
  <div id="dashboard-container"></div>

  <script type="module">
    import { DatabricksDashboard } from "/vendor/aibi-client/index.js";

    const INSTANCE_URL  = "https://adb-3997551919284009.9.azuredatabricks.net";
    const WORKSPACE_ID  = "3997551919284009";
    const DASHBOARD_ID  = "01f0bba8df9b1c0ebcf5dc38714d79aa";

    async function fetchToken() {
      const r = await fetch("/api/dashboard/token", { credentials: "include" });
      const json = await r.json();
      if (!json.success) throw new Error(json.error || "토큰 발급 실패");
      return json.token;
    }

    (async () => {
      const statusEl = document.getElementById("dashboard-status");
      try {
        const token = await fetchToken();
        statusEl.style.display = "none";

        const dashboard = new DatabricksDashboard({
          instanceUrl: INSTANCE_URL,
          workspaceId: WORKSPACE_ID,
          dashboardId: DASHBOARD_ID,
          token,
          getNewToken: fetchToken,
          container: document.getElementById("dashboard-container"),
          colorScheme: "light",
          config: { version: 1, hideDatabricksLogo: false },
        });

        dashboard.initialize();
      } catch (err) {
        statusEl.textContent = "대시보드 로드 실패: " + err.message;
        statusEl.style.color = "#d9534f";
      }
    })();
  </script>
  <script src="/js/page-view-log.js" data-page="종합 대시보드"></script>
</body>
</html>
