<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>관리자 계정 관리</title>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <header class="page-header">
    <a href="../index.html" class="logo-link" title="메인으로">
      <img src="../images/logo_text.png" alt="덕원농장 위탁장 관리" class="page-logo" />
    </a>
    <h2 class="detail-title">관리자 계정 관리</h2>
  </header>

  <!-- 관리자 추가 카드 -->
  <div class="ls-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h3 class="ls-section-title" style="margin:0;">관리자 추가</h3>
      <button class="ls-btn ls-btn-primary" id="btnAdd"><i class="fa-solid fa-plus"></i> 추가</button>
    </div>
    <div class="ls-form-grid" style="grid-template-columns:1fr 1fr;">
      <div class="ls-form-group">
        <label>UPN (이메일) *</label>
        <input type="email" id="newUpn" placeholder="user@example.com" />
      </div>
      <div class="ls-form-group">
        <label>표시 이름</label>
        <input type="text" id="newName" placeholder="홍길동" />
      </div>
    </div>
  </div>

  <!-- 계정 목록 카드 -->
  <div class="ls-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h3 class="ls-section-title" style="margin:0;">
        계정 목록
        <small style="font-size:0.75rem;color:#94a3b8;font-weight:400;margin-left:6px;">로그인 이력이 있는 모든 계정 포함</small>
      </h3>
      <button class="ls-btn ls-btn-gray" onclick="loadAdmins()"><i class="fa-solid fa-rotate-right"></i> 새로고침</button>
    </div>
    <div class="ls-table-wrap">
      <table class="ls-table" id="adminTable">
        <thead>
          <tr>
            <th>#</th>
            <th>UPN (이메일)</th>
            <th>표시 이름</th>
            <th>상태</th>
            <th>등록일</th>
            <th>접속횟수</th>
            <th>최종접속일</th>
            <th>작업</th>
          </tr>
        </thead>
        <tbody id="adminTbody">
          <tr><td colspan="8" class="ls-empty">로딩 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/table-sort.js"></script>
  <script>
  function toKST(utcStr) {
    if (!utcStr) return "-";
    return new Date(utcStr).toLocaleDateString("ko-KR", { timeZone: "Asia/Seoul" });
  }
  function toKSTDT(utcStr) {
    if (!utcStr) return "-";
    return new Date(utcStr).toLocaleString("ko-KR", {
      timeZone: "Asia/Seoul", year: "numeric", month: "2-digit",
      day: "2-digit", hour: "2-digit", minute: "2-digit"
    });
  }
  function toast(icon, title) {
    Swal.fire({ toast: true, position: "top-end", icon, title, showConfirmButton: false, timer: 1500 });
  }

  async function loadAdmins() {
    const tbody = document.getElementById("adminTbody");
    tbody.innerHTML = `<tr><td colspan="8" class="ls-empty">로딩 중...</td></tr>`;
    try {
      const res = await fetch("/api/admins", { credentials: "same-origin" });
      if (res.status === 403) {
        tbody.innerHTML = `<tr><td colspan="8" class="ls-empty" style="color:#d9534f;">관리자만 접근할 수 있습니다.</td></tr>`;
        return;
      }
      const data = await res.json();
      if (!data.success) throw new Error(data.error || "오류");
      renderTable(data.admins);
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="8" class="ls-empty" style="color:#d9534f;">${err.message}</td></tr>`;
    }
  }

  function renderTable(admins) {
    const tbody = document.getElementById("adminTbody");
    if (!admins.length) {
      tbody.innerHTML = `<tr><td colspan="8" class="ls-empty">계정이 없습니다.</td></tr>`;
      return;
    }

    tbody.innerHTML = admins.map(a => {
      const isGuest = a.id === null || a.id === undefined;
      const idCell  = isGuest ? `<span style="color:#ccc;">-</span>` : a.id;

      const statusBadge = isGuest
        ? `<span class="badge-done">미등록</span>`
        : `<span class="badge-${a.enabled ? "active" : "done"}">${a.enabled ? "활성" : "비활성"}</span>`;

      const loginCount = (a.login_count > 0)
        ? `<b>${Number(a.login_count).toLocaleString()}</b>`
        : `<span style="color:#ccc;">0</span>`;

      // 작업 버튼
      const actionBtns = isGuest ? `
        <button class="ls-btn ls-btn-gray btn-save-name" data-upn="${a.upn}" style="padding:3px 8px;font-size:0.78rem;">이름저장</button>
        <button class="ls-btn ls-btn-primary btn-promote" data-upn="${a.upn}" style="padding:3px 8px;font-size:0.78rem;">관리자 등록</button>
      ` : `
        <button class="ls-btn ls-btn-gray btn-save-name" data-id="${a.id}" data-upn="${a.upn}" style="padding:3px 8px;font-size:0.78rem;">이름저장</button>
        <button class="ls-btn ${a.enabled ? "ls-btn-yellow" : "ls-btn-teal"} btn-toggle" data-id="${a.id}" data-enabled="${a.enabled}" style="padding:3px 8px;font-size:0.78rem;">${a.enabled ? "비활성화" : "활성화"}</button>
        <button class="ls-btn ls-btn-red btn-del" data-id="${a.id}" style="padding:3px 8px;font-size:0.78rem;">삭제</button>
      `;

      return `<tr>
        <td>${idCell}</td>
        <td style="text-align:left;">${a.upn}</td>
        <td><input type="text" class="name-input" data-id="${a.id || ""}" data-upn="${a.upn}"
          value="${a.name || ""}" placeholder="표시 이름"
          style="border:1px solid #e2e8f0;border-radius:5px;padding:3px 8px;font-size:0.83rem;width:120px;text-align:left;" /></td>
        <td>${statusBadge}</td>
        <td>${isGuest ? "<span style='color:#ccc;'>-</span>" : toKST(a.created_at)}</td>
        <td>${loginCount}</td>
        <td style="white-space:nowrap;">${toKSTDT(a.last_login)}</td>
        <td style="white-space:nowrap;">${actionBtns}</td>
      </tr>`;
    }).join("");

    // 이름 저장 (관리자 + 비관리자 공통)
    tbody.querySelectorAll(".btn-save-name").forEach(btn => {
      btn.addEventListener("click", async () => {
        const upn  = btn.dataset.upn;
        const id   = btn.dataset.id ? parseInt(btn.dataset.id, 10) : null;
        const nameInput = tbody.querySelector(`.name-input[data-upn="${upn}"]`);
        const name = nameInput?.value.trim() || "";

        try {
          if (id) {
            // 기존 관리자: PUT으로 이름만 저장 (enabled 유지)
            const toggleBtn = tbody.querySelector(`.btn-toggle[data-id="${id}"]`);
            const enabled   = toggleBtn?.dataset.enabled === "true";
            const res = await fetch(`/api/admins/${id}`, {
              method: "PUT", credentials: "same-origin",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ name, enabled }),
            });
            const data = await res.json();
            if (!data.success) throw new Error(data.error);
          } else {
            // 비관리자: PATCH name (enabled=false upsert)
            const res = await fetch("/api/admins/name", {
              method: "PATCH", credentials: "same-origin",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ upn, name }),
            });
            const data = await res.json();
            if (!data.success) throw new Error(data.error);
          }
          toast("success", "저장됐습니다");
          loadAdmins();
        } catch (err) {
          Swal.fire({ icon: "error", title: "저장 실패", text: err.message });
        }
      });
    });

    // 관리자 등록 (미등록 → 관리자)
    tbody.querySelectorAll(".btn-promote").forEach(btn => {
      btn.addEventListener("click", async () => {
        const upn = btn.dataset.upn;
        const nameInput = tbody.querySelector(`.name-input[data-upn="${upn}"]`);
        const name = nameInput?.value.trim() || "";
        const { isConfirmed } = await Swal.fire({
          title: "관리자로 등록할까요?", text: upn, icon: "question",
          showCancelButton: true, confirmButtonText: "등록", cancelButtonText: "취소",
          confirmButtonColor: "#146C43",
        });
        if (!isConfirmed) return;
        try {
          const res = await fetch("/api/admins", {
            method: "POST", credentials: "same-origin",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ upn, name }),
          });
          const data = await res.json();
          if (!data.success) throw new Error(data.error);
          toast("success", "등록됐습니다");
          loadAdmins();
        } catch (err) {
          Swal.fire({ icon: "error", title: "오류", text: err.message });
        }
      });
    });

    // 활성/비활성 토글
    tbody.querySelectorAll(".btn-toggle").forEach(btn => {
      btn.addEventListener("click", async () => {
        const id      = parseInt(btn.dataset.id, 10);
        const enabled = btn.dataset.enabled === "true";
        const nameInput = tbody.querySelector(`.name-input[data-id="${id}"]`);
        try {
          const res = await fetch(`/api/admins/${id}`, {
            method: "PUT", credentials: "same-origin",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: nameInput?.value || "", enabled: !enabled }),
          });
          const data = await res.json();
          if (!data.success) throw new Error(data.error);
          toast("success", !enabled ? "활성화됐습니다" : "비활성화됐습니다");
          loadAdmins();
        } catch (err) {
          Swal.fire({ icon: "error", title: "오류", text: err.message });
        }
      });
    });

    // 삭제
    tbody.querySelectorAll(".btn-del").forEach(btn => {
      btn.addEventListener("click", async () => {
        const id = parseInt(btn.dataset.id, 10);
        const { isConfirmed } = await Swal.fire({
          title: "삭제 확인", text: "이 관리자를 삭제하시겠습니까?", icon: "warning",
          showCancelButton: true, confirmButtonColor: "#d9534f",
          confirmButtonText: "삭제", cancelButtonText: "취소",
        });
        if (!isConfirmed) return;
        try {
          const res = await fetch(`/api/admins/${id}`, { method: "DELETE", credentials: "same-origin" });
          const data = await res.json();
          if (!data.success) throw new Error(data.error);
          toast("success", "삭제됐습니다");
          loadAdmins();
        } catch (err) {
          Swal.fire({ icon: "error", title: "오류", text: err.message });
        }
      });
    });

    window.initTableSort?.();
  }

  document.getElementById("btnAdd").addEventListener("click", async () => {
    const upn  = document.getElementById("newUpn").value.trim();
    const name = document.getElementById("newName").value.trim();
    if (!upn) { Swal.fire({ icon: "warning", title: "UPN 입력 필요" }); return; }
    try {
      const res = await fetch("/api/admins", {
        method: "POST", credentials: "same-origin",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ upn, name }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error);
      document.getElementById("newUpn").value = "";
      document.getElementById("newName").value = "";
      toast("success", "추가됐습니다");
      loadAdmins();
    } catch (err) {
      Swal.fire({ icon: "error", title: "오류", text: err.message });
    }
  });

  document.getElementById("newUpn").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("btnAdd").click();
  });

  loadAdmins();
  </script>
  <script src="/js/page-view-log.js" data-page="관리자 계정 관리"></script>
</body>
</html>
