<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>일자별 등판정 파일 업로드</title>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <header class="page-header">
    <a href="../index.html" class="logo-link" title="메인으로">
      <img src="../images/logo_text.png" alt="덕원농장 위탁장 관리" class="page-logo" />
    </a>
    <h2 class="detail-title">일자별 등판정 XLS 파일 업로드</h2>
  </header>

  <div class="ls-card">
    <form id="uploadForm" enctype="multipart/form-data">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 class="ls-section-title" style="margin:0;">XLS 파일 업로드</h3>
        <div style="display:flex;align-items:center;gap:8px;">
          <span id="status" style="font-size:0.85rem;color:#555;"></span>
          <button type="submit" class="ls-btn ls-btn-primary" id="btnUpload">
            <i class="fa-solid fa-upload"></i> 업로드
          </button>
        </div>
      </div>
      <div class="ls-form-group" style="max-width:520px;">
        <label>파일 선택 <span style="font-size:0.8rem;color:#888;">(여러 파일 동시 선택 가능)</span></label>
        <input type="file" name="xlsFiles" id="fileInput" accept=".xls,.xlsx" multiple required />
      </div>
      <div id="file-list" style="margin-top:8px;font-size:0.83rem;color:#555;"></div>
    </form>

    <div id="result-list" style="margin-top:16px;"></div>
  </div>

  <div class="ls-card" style="margin-top:16px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div>
        <h3 class="ls-section-title" style="margin:0;">전체 DAT 리셋</h3>
        <p style="font-size:0.82rem;color:#888;margin:4px 0 0;">Databricks 4개 테이블의 모든 데이터를 삭제합니다.</p>
      </div>
      <button class="ls-btn ls-btn-red" id="btnReset" onclick="resetDat()">
        <i class="fa-solid fa-trash-can"></i> 전체 리셋
      </button>
    </div>
    <div id="reset-result"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    document.getElementById("fileInput").addEventListener("change", function () {
      const files = [...this.files];
      const el = document.getElementById("file-list");
      if (!files.length) { el.innerHTML = ""; return; }
      el.innerHTML = files.map(f =>
        `<div style="padding:2px 0;"><i class="fa-solid fa-file-excel" style="color:#1a7a3e;margin-right:5px;"></i>${f.name}</div>`
      ).join("");
    });

    document.getElementById("uploadForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const files = document.getElementById("fileInput").files;
      if (!files.length) return;

      const statusEl  = document.getElementById("status");
      const resultEl  = document.getElementById("result-list");
      const btnUpload = document.getElementById("btnUpload");

      statusEl.textContent = `업로드 중... (0 / ${files.length})`;
      btnUpload.disabled = true;
      resultEl.innerHTML = "";

      const formData = new FormData();
      for (const f of files) formData.append("xlsFiles", f);

      try {
        const res = await fetch("/upload", { method: "POST", body: formData });
        const data = await res.json();

        statusEl.textContent = data.message || "";

        if (data.results && data.results.length) {
          resultEl.innerHTML = `
            <table class="ls-table" style="max-width:680px;">
              <thead><tr><th>원본 파일명</th><th>결과</th></tr></thead>
              <tbody>
                ${data.results.map(r => `
                  <tr>
                    <td>${r.original}</td>
                    <td>${r.success
                      ? `<span style="color:#146C43;font-weight:700;">✅ 성공</span>`
                      : `<span style="color:#d9534f;font-weight:700;">❌ 실패: ${r.error || ""}</span>`
                    }</td>
                  </tr>`).join("")}
              </tbody>
            </table>`;
        }
      } catch (err) {
        statusEl.textContent = "❌ 업로드 실패: " + err.message;
        statusEl.style.color = "#d9534f";
      } finally {
        btnUpload.disabled = false;
      }
    });
    async function resetDat() {
      const { isConfirmed } = await Swal.fire({
        icon: "warning",
        title: "전체 DAT 리셋",
        html: `<p>Databricks의 다음 4개 테이블 데이터를 <b>모두 삭제</b>합니다.<br><br>
          <code style="font-size:0.78rem;line-height:1.8;text-align:left;display:block;">
            input_dedup_history_notmachine<br>
            input_table_notmachine<br>
            output_table<br>
            dm_farm
          </code></p>`,
        showCancelButton: true,
        confirmButtonText: "리셋 실행",
        cancelButtonText: "취소",
        confirmButtonColor: "#d9534f",
      });
      if (!isConfirmed) return;

      const btn = document.getElementById("btnReset");
      const resultEl = document.getElementById("reset-result");
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 처리 중...`;
      resultEl.innerHTML = "";

      try {
        const res = await fetch("/upload/reset-dat", { method: "POST", credentials: "same-origin" });
        const data = await res.json();

        if (data.results) {
          resultEl.innerHTML = `
            <p style="font-weight:700;margin-bottom:8px;">${data.message}</p>
            <table class="ls-table" style="max-width:600px;">
              <thead><tr><th>테이블</th><th>결과</th></tr></thead>
              <tbody>
                ${data.results.map(r => `
                  <tr>
                    <td style="font-size:0.82rem;">${r.table}</td>
                    <td>${r.success
                      ? `<span style="color:#146C43;font-weight:700;">✅ 완료</span>`
                      : `<span style="color:#d9534f;font-weight:700;">❌ ${r.error || "실패"}</span>`
                    }</td>
                  </tr>`).join("")}
              </tbody>
            </table>`;
        } else {
          resultEl.innerHTML = `<p style="color:#d9534f;">${data.message || "오류 발생"}</p>`;
        }
      } catch (err) {
        resultEl.innerHTML = `<p style="color:#d9534f;">❌ 오류: ${err.message}</p>`;
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<i class="fa-solid fa-trash-can"></i> 전체 리셋`;
      }
    }
  </script>
  <script src="/js/page-view-log.js" data-page="등판정 업로드"></script>
</body>
</html>
