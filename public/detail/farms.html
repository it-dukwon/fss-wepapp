<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>농장 관리</title>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <header class="page-header">
    <a href="../index.html" class="logo-link" title="메인으로">
      <img src="../images/logo_text.png" alt="덕원농장 위탁장 관리" class="page-logo" />
    </a>
    <h2 class="detail-title">농장 관리</h2>
  </header>

  <!-- 탭 네비게이션 -->
  <div class="ls-tabs">
    <button class="ls-tab-btn active" data-tab="companies">사료회사</button>
    <button class="ls-tab-btn" data-tab="managers">관리자</button>
    <button class="ls-tab-btn" data-tab="farms">농장</button>
    <button class="ls-tab-btn" data-tab="badges">뱃지</button>
  </div>

  <!-- 탭 1: 농장 -->
  <div id="tab-farms" class="ls-tab-content">
    <div class="ls-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 class="ls-section-title" style="margin:0;">신규 농장 등록</h3>
        <button class="ls-btn ls-btn-primary" onclick="addFarm()"><i class="fa-solid fa-plus"></i> 등록</button>
      </div>
      <div class="ls-form-grid">
        <div class="ls-form-group">
          <label>농장명 *</label>
          <input type="text" id="fn-name" placeholder="농장명" />
        </div>
        <div class="ls-form-group">
          <label>지역</label>
          <input type="text" id="fn-region" placeholder="예: 경기 이천" />
        </div>
        <div class="ls-form-group">
          <label>농장주</label>
          <input type="text" id="fn-owner" />
        </div>
        <div class="ls-form-group">
          <label>농장주 이메일</label>
          <input type="email" id="fn-email" placeholder="정산서 발송용" />
        </div>
        <div class="ls-form-group">
          <label>사료회사</label>
          <select id="fn-company"></select>
        </div>
        <div class="ls-form-group">
          <label>관리자</label>
          <select id="fn-manager"></select>
        </div>
        <div class="ls-form-group">
          <label>계약상태</label>
          <input type="text" id="fn-status" placeholder="예: 계약중" />
        </div>
        <div class="ls-form-group">
          <label>계약시작일</label>
          <input type="date" id="fn-start" />
        </div>
        <div class="ls-form-group">
          <label>계약종료일</label>
          <input type="date" id="fn-end" />
        </div>
      </div>
    </div>

    <div class="ls-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 class="ls-section-title" style="margin:0;">농장 목록</h3>
        <button class="ls-btn ls-btn-gray" onclick="loadFarms()"><i class="fa-solid fa-rotate-right"></i> 새로고침</button>
      </div>
      <div class="ls-table-wrap">
        <table class="ls-table">
          <thead>
            <tr>
              <th>ID</th><th>농장명</th><th>지역</th><th>농장주</th><th>이메일</th>
              <th>사료회사</th><th>관리자</th><th>계약상태</th>
              <th>계약시작일</th><th>계약종료일</th><th>수정</th><th>삭제</th>
            </tr>
          </thead>
          <tbody id="farm-tbody">
            <tr><td colspan="12" class="ls-empty">로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 탭 2: 사료회사 -->
  <div id="tab-companies" class="ls-tab-content active">
    <div class="ls-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 class="ls-section-title" style="margin:0;">사료회사 등록</h3>
        <button class="ls-btn ls-btn-primary" onclick="addCompany()"><i class="fa-solid fa-plus"></i> 등록</button>
      </div>
      <div class="ls-form-grid" style="max-width:600px;">
        <div class="ls-form-group">
          <label>회사명 *</label>
          <input type="text" id="co-name" placeholder="사료회사명" />
        </div>
        <div class="ls-form-group">
          <label>메모</label>
          <input type="text" id="co-note" />
        </div>
      </div>
    </div>

    <div class="ls-card">
      <h3 class="ls-section-title">사료회사 목록</h3>
      <div class="ls-table-wrap">
        <table class="ls-table">
          <thead>
            <tr><th>ID</th><th>회사명</th><th>메모</th><th>수정</th><th>삭제</th></tr>
          </thead>
          <tbody id="company-tbody">
            <tr><td colspan="5" class="ls-empty">로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 탭 3: 관리자 -->
  <div id="tab-managers" class="ls-tab-content">
    <div class="ls-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 class="ls-section-title" style="margin:0;">관리자 등록</h3>
        <button class="ls-btn ls-btn-primary" onclick="addManager()"><i class="fa-solid fa-plus"></i> 등록</button>
      </div>
      <div class="ls-form-grid" style="grid-template-columns:repeat(4,1fr);">
        <div class="ls-form-group">
          <label>이름 *</label>
          <input type="text" id="mg-name" placeholder="관리자 이름" />
        </div>
        <div class="ls-form-group">
          <label>소속 사료회사</label>
          <select id="mg-company"></select>
        </div>
        <div class="ls-form-group">
          <label>연락처</label>
          <input type="text" id="mg-phone" placeholder="010-0000-0000" />
        </div>
        <div class="ls-form-group">
          <label>메모</label>
          <input type="text" id="mg-note" />
        </div>
      </div>
    </div>

    <div class="ls-card">
      <h3 class="ls-section-title">관리자 목록</h3>
      <div class="ls-table-wrap">
        <table class="ls-table">
          <thead>
            <tr><th>ID</th><th>이름</th><th>사료회사</th><th>연락처</th><th>메모</th><th>수정</th><th>삭제</th></tr>
          </thead>
          <tbody id="manager-tbody">
            <tr><td colspan="7" class="ls-empty">로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 탭 4: 뱃지 -->
  <div id="tab-badges" class="ls-tab-content">
    <div class="ls-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 class="ls-section-title" style="margin:0;">신규 뱃지 등록</h3>
        <button class="ls-btn ls-btn-primary" onclick="addBadge()"><i class="fa-solid fa-plus"></i> 등록</button>
      </div>
      <div class="ls-form-grid">
        <div class="ls-form-group">
          <label>농장 *</label>
          <select id="bd-farm"></select>
        </div>
        <div class="ls-form-group">
          <label>뱃지 구분 (A/B/C 등, 없으면 공란)</label>
          <input type="text" id="bd-suffix" placeholder="예: A, B, C" maxlength="5" />
        </div>
        <div class="ls-form-group">
          <label>관리자</label>
          <select id="bd-manager"><option value="">-- 농장 먼저 선택 --</option></select>
        </div>
        <div class="ls-form-group" style="grid-column:span 2;">
          <label>메모</label>
          <input type="text" id="bd-note" />
        </div>
      </div>
    </div>

    <div class="ls-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 class="ls-section-title" style="margin:0;">활성 뱃지</h3>
        <button class="ls-btn ls-btn-gray" onclick="loadBadges()"><i class="fa-solid fa-rotate-right"></i> 새로고침</button>
      </div>
      <div class="ls-table-wrap">
        <table class="ls-table">
          <thead>
            <tr>
              <th>ID</th><th>뱃지명</th><th>농장</th><th>관리자</th>
              <th>입식일</th><th>현재두수</th><th>상태</th><th>완료처리</th>
            </tr>
          </thead>
          <tbody id="badges-active-tbody">
            <tr><td colspan="8" class="ls-empty">로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="ls-card">
      <h3 class="ls-section-title">완료 뱃지</h3>
      <div class="ls-table-wrap">
        <table class="ls-table">
          <thead>
            <tr>
              <th>ID</th><th>뱃지명</th><th>농장</th><th>관리자</th>
              <th>입식일</th><th>상태</th><th>복원</th>
            </tr>
          </thead>
          <tbody id="badges-done-tbody">
            <tr><td colspan="7" class="ls-empty">완료된 뱃지 없음</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/table-sort.js"></script>
  <script src="../js/farms-crud.js"></script>
  <script src="/js/page-view-log.js" data-page="농장 관리"></script>
</body>
</html>
