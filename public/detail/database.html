<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>DB 관리</title>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <header class="page-header">
    <a href="../index.html" class="logo-link" title="메인으로">
      <img src="../images/logo_text.png" alt="덕원농장 위탁장 관리" class="page-logo" />
    </a>
    <h2 class="detail-title">DB 관리</h2>
  </header>

  <div class="ls-card">
    <h3 class="ls-section-title">PostgreSQL 서버 제어</h3>
    <div class="ls-btn-row">
      <button id="startDbBtn" class="ls-btn ls-btn-primary"><i class="fa-solid fa-play"></i> Start DB</button>
      <button id="stopDbBtn" class="ls-btn ls-btn-red"><i class="fa-solid fa-stop"></i> Stop DB</button>
      <span id="db-msg" style="font-size:0.85rem;color:#555;"></span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
  (function(){
    let resolvedDefaults = { resourceGroup: null, serverName: null, subscriptionId: null };

    async function loadDefaults() {
      try {
        const r = await fetch('/api/azure-postgres/defaults', { credentials: 'same-origin' });
        if (r.ok) resolvedDefaults = await r.json();
      } catch (e) {
        console.warn('Could not load defaults:', e.message || e);
      }
    }

    async function callAction(action) {
      const payload = {
        resourceGroup: resolvedDefaults.resourceGroup,
        serverName: resolvedDefaults.serverName,
      };
      if (!payload.resourceGroup || !payload.serverName) {
        Swal.fire({ icon: 'error', title: '설정 오류', text: '서버 구성값이 설정되어 있지 않습니다. 관리자에게 AZURE_RESOURCE_GROUP / AZURE_PG_SERVER_NAME 설정을 요청하세요.' });
        return;
      }

      const msgEl = document.getElementById('db-msg');
      msgEl.textContent = '처리 중...';
      try {
        const res = await fetch(`/api/azure-postgres/${action}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          credentials: 'same-origin'
        });
        const data = await res.json();
        msgEl.textContent = '';
        Swal.fire({ icon: res.ok ? 'success' : 'warning', title: action === 'start' ? 'DB 시작' : 'DB 중지', text: data.message || JSON.stringify(data) });
      } catch (err) {
        msgEl.textContent = '';
        Swal.fire({ icon: 'error', title: '요청 실패', text: err.message });
      }
    }

    document.getElementById("stopDbBtn").addEventListener("click", async () => {
      await loadDefaults();
      await callAction('stop');
    });

    document.getElementById("startDbBtn").addEventListener("click", async () => {
      await loadDefaults();
      await callAction('start');
    });
  })();
  </script>
  <script src="/js/page-view-log.js" data-page="DB 관리"></script>
</body>
</html>
