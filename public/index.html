<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>덕원농장 관리 시스템</title>

  <link rel="stylesheet" href="./styles.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
  <script src="/js/auth-gate.js"></script>
</head>
<body>
  <!-- 한줄공지 배너 -->
  <div id="notice-banner" style="display:none;background:#c0392b;color:#fff;text-align:center;padding:9px 16px;font-size:0.9rem;font-weight:600;letter-spacing:0.01em;position:relative;">
    <span id="notice-banner-text"></span>
    <button onclick="document.getElementById('notice-banner').style.display='none'"
      style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:1.1rem;cursor:pointer;opacity:0.8;" title="닫기">✕</button>
  </div>

  <div class="page-bg">
    <main class="shell">

      <!-- Top Header -->
      <header class="topbar">
        <div class="brand">
          <a href="/" title="홈으로">
            <img class="brand-logo" src="images/logo1984.png" alt="덕원농장 1984" />
          </a>
        </div>

        <nav class="nav">
          <a class="nav-item" href="detail/board.html">공지사항</a>
        </nav>

        <div class="actions">
          <!-- 메뉴 검색 -->
          <div class="search" id="searchBox">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="menuSearch" placeholder="메뉴 검색" autocomplete="off" />
            <!-- 검색 결과 드롭다운 -->
            <ul class="search-dropdown" id="searchDropdown"></ul>
          </div>

          <div class="avatar" title="사용자" id="userAvatar">
            <span>🙂</span>
          </div>

          <button class="logout-btn" type="button" id="logoutBtn" aria-label="로그아웃">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>로그아웃</span>
          </button>
        </div>
      </header>

      <!-- Hero -->
      <section class="hero">
        <div class="hero-inner">
          <div class="hero-copy">
            <h1>덕원농장 관리 시스템</h1>
            <p>덕원농장의 운영과 관리를 한 곳에서 쉽고 빠르게 관리하세요.</p>
          </div>
        </div>
      </section>

      <!-- Content -->
      <section class="content">

        <!-- ── 분석 / 현황 ── -->
        <div class="menu-group">
          <h3 class="menu-group-title"><i class="fa-solid fa-chart-line"></i> 분석 / 현황</h3>
          <div class="quick-card">
            <a class="quick-link" href="detail/dashboard.html" data-menu="종합 대시보드 분석 현황">
              <i class="fa-solid fa-chart-line"></i>
              <span>종합 대시보드</span>
            </a>
            <a class="quick-link" href="detail/genie.html" data-menu="Genie AI 데이터 분석 챗봇">
              <i class="fa-solid fa-wand-magic-sparkles"></i>
              <span>Genie AI 분석</span>
            </a>
            <a class="quick-link" href="detail/claude.html" data-menu="Claude AI 어시스턴트 챗봇 질문">
              <i class="fa-solid fa-robot"></i>
              <span>Claude AI</span>
            </a>
          </div>
        </div>

        <!-- ── 농장 운영 ── -->
        <div class="menu-group">
          <h3 class="menu-group-title"><i class="fa-solid fa-house"></i> 농장 운영</h3>
          <div class="quick-card">
            <a class="quick-link" href="detail/farms.html" data-menu="농장 관리">
              <i class="fa-solid fa-house"></i>
              <span>농장 관리</span>
            </a>
            <a class="quick-link" href="detail/livestock.html" data-menu="사육두수 관리">
              <i class="fa-solid fa-cow"></i>
              <span>사육두수 관리</span>
            </a>
            <a class="quick-link" href="detail/upload.html" data-menu="등판정 업로드">
              <i class="fa-solid fa-file-arrow-up"></i>
              <span>등판정 업로드</span>
            </a>
            <a class="quick-link grid-item--muted" href="#" data-menu="출하 관리">
              <i class="fa-solid fa-truck"></i>
              <span>출하 관리</span>
            </a>
            <a class="quick-link grid-item--muted" href="#" data-menu="일정 관리">
              <i class="fa-solid fa-calendar"></i>
              <span>일정 관리</span>
            </a>
          </div>
        </div>

        <!-- ── 커뮤니케이션 ── -->
        <div class="menu-group">
          <h3 class="menu-group-title"><i class="fa-solid fa-clipboard"></i> 커뮤니케이션</h3>
          <div class="quick-card">
            <a class="quick-link" href="detail/board.html" data-menu="공지사항 게시판">
              <i class="fa-solid fa-clipboard"></i>
              <span>공지사항</span>
            </a>
          </div>
        </div>

        <!-- ── 준비 중 ── -->
        <div class="menu-group">
          <h3 class="menu-group-title"><i class="fa-solid fa-clock"></i> 준비 중</h3>
          <div class="quick-card">
            <a class="quick-link grid-item--muted" href="#" data-menu="직원 관리">
              <i class="fa-solid fa-person"></i>
              <span>직원 관리</span>
            </a>
            <a class="quick-link grid-item--muted" href="#" data-menu="문서 관리">
              <i class="fa-solid fa-folder-open"></i>
              <span>문서 관리</span>
            </a>
            <a class="quick-link grid-item--muted" href="#" data-menu="구매 관리">
              <i class="fa-solid fa-cart-shopping"></i>
              <span>구매 관리</span>
            </a>
            <a class="quick-link grid-item--muted" href="#" data-menu="계정 관리">
              <i class="fa-solid fa-user"></i>
              <span>계정 관리</span>
            </a>
          </div>
        </div>

        <!-- ── 시스템 관리 (관리자 전용) ── -->
        <div class="menu-group admin-only" style="display:none;">
          <h3 class="menu-group-title menu-group-title--admin"><i class="fa-solid fa-shield-halved"></i> 시스템 관리 <span class="admin-badge">관리자</span></h3>
          <div class="quick-card">
            <a class="quick-link" href="detail/database.html" data-menu="DB 관리 데이터베이스">
              <i class="fa-solid fa-database"></i>
              <span>DB 관리</span>
            </a>
            <a class="quick-link" href="detail/email-recipients.html" data-menu="이메일 수신대상 알람 수신자">
              <i class="fa-solid fa-envelope"></i>
              <span>이메일 수신대상 관리</span>
            </a>
            <a class="quick-link" href="detail/audit-log.html" data-menu="활동 로그 사용자 로그 감사">
              <i class="fa-solid fa-scroll"></i>
              <span>활동 로그</span>
            </a>
            <a class="quick-link" href="detail/admin-users.html" data-menu="관리자 계정 관리 어드민">
              <i class="fa-solid fa-user-shield"></i>
              <span>관리자 계정 관리</span>
            </a>
          </div>
        </div>

      </section>
    </main>
  </div>

  <script>
    // 한줄공지 배너
    fetch("/api/notice-banners/active", { credentials: "same-origin" })
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (data?.banner?.message) {
          document.getElementById("notice-banner-text").textContent = data.banner.message;
          document.getElementById("notice-banner").style.display = "";
        }
      })
      .catch(() => {});

    // 로그아웃
    document.getElementById("logoutBtn")?.addEventListener("click", () => {
      window.location.href = "/logout";
    });

    // 로그인 사용자 이름 표시 + 관리자 메뉴 노출
    fetch("/api/me", { credentials: "same-origin" })
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (data?.displayName || data?.user?.name) {
          const avatar = document.getElementById("userAvatar");
          if (avatar) avatar.title = data.displayName || data.user.name;
        }
        if (data?.isAdmin) {
          document.querySelectorAll(".admin-only").forEach(el => {
            el.style.display = "";
          });
        }
      })
      .catch(() => {});

    // 메뉴 검색
    (function () {
      const input = document.getElementById("menuSearch");
      const dropdown = document.getElementById("searchDropdown");

      // 검색 대상: data-menu 속성 가진 모든 링크
      const allMenuItems = () =>
        [...document.querySelectorAll("[data-menu]")].map(el => ({
          el,
          label: el.querySelector("span")?.textContent?.trim() || "",
          keywords: (el.dataset.menu || "").toLowerCase(),
          href: el.getAttribute("href") || "#",
        }));

      function renderDropdown(query) {
        dropdown.innerHTML = "";
        if (!query) { dropdown.classList.remove("open"); return; }

        const q = query.toLowerCase();
        const matches = allMenuItems().filter(item =>
          item.label.includes(query) || item.keywords.includes(q)
        );

        if (matches.length === 0) {
          const li = document.createElement("li");
          li.className = "search-dropdown-empty";
          li.textContent = "검색 결과 없음";
          dropdown.appendChild(li);
        } else {
          matches.forEach(item => {
            const li = document.createElement("li");
            li.innerHTML = `<i class="${item.el.querySelector("i")?.className || "fa-solid fa-link"}"></i> ${item.label}`;
            li.addEventListener("mousedown", () => {
              if (item.href && item.href !== "#") window.location.href = item.href;
              else item.el.scrollIntoView({ behavior: "smooth", block: "center" });
              input.value = "";
              dropdown.classList.remove("open");
            });
            dropdown.appendChild(li);
          });
        }
        dropdown.classList.add("open");
      }

      input.addEventListener("input", () => renderDropdown(input.value.trim()));

      input.addEventListener("keydown", e => {
        if (e.key === "Escape") { input.value = ""; dropdown.classList.remove("open"); }
      });

      document.addEventListener("click", e => {
        if (!document.getElementById("searchBox").contains(e.target)) {
          dropdown.classList.remove("open");
        }
      });
    })();
  </script>
</body>
</html>
